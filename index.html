<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GD Portable</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <!-- Главное меню (Видно сразу) -->
    <div id="mainMenu">
        <h1 class="game-title">GEOMETRY JS</h1>
        <div class="buttons-container">
            <!-- Кнопка Скины (Слева) -->
            <button id="btnSkin" class="menu-btn box-btn" style="background-color: #A158FF;">
                <div class="icon-face"></div>
            </button>
            
            <!-- Кнопка Играть (Центр) -->
            <button id="btnPlay" class="menu-btn play-btn">
                <div class="icon-play"></div>
            </button>
            
            <!-- Кнопка Уровни (Справа) -->
            <button id="btnLevels" class="menu-btn box-btn" style="background-color: #00AAFF;">
                <div class="icon-list">☰</div>
            </button>
        </div>
        <div id="currentLevelName" class="level-indicator">Level 1: Stereo Start</div>
    </div>

    <!-- Меню выбора уровней (Скрыто) -->
    <div id="levelsMenu" class="hidden">
        <h2>SELECT LEVEL</h2>
        <div class="level-grid" id="levelGrid">
            <!-- Кнопки создаются через JS -->
        </div>
        <button onclick="backToMenu()" class="back-btn" style="margin-top: 20px;">Back</button>
    </div>

    <!-- Меню скинов (Скрыто) -->
    <div id="skinMenu" class="hidden">
        <h2>Choose Color</h2>
        <div class="colors">
            <div class="color-swatch" style="background:#FFFF00" onclick="setSkin('#FFFF00')"></div>
            <div class="color-swatch" style="background:#00FF00" onclick="setSkin('#00FF00')"></div>
            <div class="color-swatch" style="background:#00FFFF" onclick="setSkin('#00FFFF')"></div>
            <div class="color-swatch" style="background:#FF0000" onclick="setSkin('#FF0000')"></div>
        </div>
        <button onclick="backToMenu()" class="back-btn">Back</button>
    </div>

    <!-- Экран игры (Счетчик процентов) -->
    <div id="score">0%</div>

    <!-- Экран смерти/победы (Скрыто) -->
    <div id="gameOverScreen" class="hidden">
        <h2 id="endTitle">CRASHED!</h2>
        <div id="progressBarContainer">
            <div id="progressBarFill"></div>
        </div>
        <div id="percentText">0%</div>
        <button onclick="resetGame()" class="restart-btn">Try Again</button>
        <button onclick="backToMenu()" class="back-btn" style="margin-top:10px">Menu</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
